name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Release ${GITHUB_REF_NAME}"

  build-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            rpm

      - name: Build Linux packages
        run: |
          npm ci
          npm run tauri -- build --bundles deb,rpm

      - name: Prepare Linux release assets
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.create-release.outputs.version }}"
          mkdir -p release-assets linux-tar/sandevistan/bin linux-tar/sandevistan/share/applications linux-tar/sandevistan/share/icons/hicolor/128x128/apps

          cp src-tauri/target/release/bundle/deb/*.deb "release-assets/sandevistan-${VERSION}-x86.deb"
          cp src-tauri/target/release/bundle/rpm/*.rpm "release-assets/sandevistan-${VERSION}-x86.rpm"

          cp src-tauri/target/release/sandevistan linux-tar/sandevistan/bin/sandevistan-bin
          cp .github/packaging/linux/sandevistan linux-tar/sandevistan/bin/sandevistan
          cp .github/packaging/linux/install.sh linux-tar/sandevistan/install.sh
          cp .github/packaging/linux/uninstall.sh linux-tar/sandevistan/uninstall.sh
          cp .github/packaging/linux/README.md linux-tar/sandevistan/README.md
          cp .github/packaging/linux/sandevistan.desktop linux-tar/sandevistan/share/applications/sandevistan.desktop
          cp src-tauri/icons/128x128.png linux-tar/sandevistan/share/icons/hicolor/128x128/apps/sandevistan.png
          chmod +x linux-tar/sandevistan/bin/sandevistan linux-tar/sandevistan/bin/sandevistan-bin linux-tar/sandevistan/install.sh linux-tar/sandevistan/uninstall.sh
          tar -C linux-tar -czf "release-assets/sandevistan-${VERSION}.tar.gz" sandevistan

      - name: Upload Linux assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload "${GITHUB_REF_NAME}" release-assets/* --clobber

  build-windows:
    needs: create-release
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Windows packages
        shell: bash
        run: |
          npm ci
          npm run tauri -- build --bundles nsis,msi

      - name: Upload Windows assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.create-release.outputs.version }}"
          mkdir -p release-assets
          cp src-tauri/target/release/bundle/nsis/*.exe "release-assets/sandevistan-${VERSION}-win.exe"
          cp src-tauri/target/release/bundle/msi/*.msi "release-assets/sandevistan-${VERSION}-win.msi"
          gh release upload "${GITHUB_REF_NAME}" release-assets/* --clobber

  build-macos:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            suffix: mac-intel
          - platform: macos-14
            target: aarch64-apple-darwin
            suffix: mac-arm
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build macOS package
        shell: bash
        run: |
          npm ci
          npm run tauri -- build --target ${{ matrix.target }} --bundles dmg

      - name: Upload macOS asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.create-release.outputs.version }}"
          mkdir -p release-assets
          cp src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg "release-assets/sandevistan-${VERSION}-${{ matrix.suffix }}.dmg"
          gh release upload "${GITHUB_REF_NAME}" release-assets/* --clobber
