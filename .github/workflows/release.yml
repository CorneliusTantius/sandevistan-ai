name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: ''
            args: --bundles deb,rpm,appimage
          - platform: windows-latest
            target: ''
            args: --bundles nsis,msi
          - platform: macos-13
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg,app
          - platform: macos-14
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg,app

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Sandevistan ${{ github.ref_name }}
          releaseBody: |
            ## Sandevistan ${{ github.ref_name }}

            ### Installers
            - Linux: AppImage, DEB, RPM
            - Windows: NSIS, MSI
            - macOS Intel: DMG, app bundle
            - macOS Apple Silicon: DMG, app bundle
            - Linux helpers: install-linux-appimage.sh, install-arch-native.sh, install-arch-pkgbuild.sh

            ### Changes
            - Added Linux AppImage install script that registers a desktop launcher.
            - Added explicit macOS Apple Silicon release build.
            - Added development branch workflow with PRs into main.
            - Removed committed VS Code settings.
            - Ignored local env and .sandevistan config/secrets.
            - Set ASCII header font size to 4px.
            - Expanded RTK integration for read-only tools when enabled.
            - Added Arch PKGBUILD native package install path.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  upload-linux-installer-script:
    needs: publish-tauri
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Linux installer scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" scripts/install-linux-appimage.sh --clobber
          gh release upload "${GITHUB_REF_NAME}" scripts/install-arch-native.sh --clobber
          gh release upload "${GITHUB_REF_NAME}" scripts/install-arch-pkgbuild.sh --clobber
          gh release upload "${GITHUB_REF_NAME}" packaging/arch/PKGBUILD --clobber
